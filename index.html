<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Anchored.</title> 
    <!-- Voice recognition app captivated towards believers of Christ, including those who are non-believers.
     'Anchored' is introduces users to be guided through breath meditation with scripture and prayer; allowing users to stay anchored
     and rooted in God's agape love.--> 
</head>

<body>

    <!-- SPLASH SCREEN -->
    <div id="splashScreen" class="splash active">
        <div class="splash-content">
        <h1 class="splash-title">Anchored.</h1>
        <h2 class="splash-text">Voice recognition app to help you stay rooted in God's love.</h2>
        <div class="flame-glow"></div>

        </div>
    </div>

    <div id="circle"></div>
        <p id="text">Be still and know that I am God.</p>
        <p id="status">Voice control: say "start prayer, "stop", "peace mode", "slow down", "new scripture mode", "breath prayer mode".</p>
        <button onclick="startListening()">Enable Voice Control</button>
        
        <script src="voiceCommands.js"></script>
</body>

</html>
